<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taller 5 Ejercicios - JS y AJAX</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="contenedor">
        <div class="ejercicio">
            <h3>1. Detector de Palíndromos</h3>
            <div class="bloque-h">
                <div class="izquierda">
                    <input type="text" id="input1" placeholder="Frase aquí...">
                    <button onclick="ex1()">Probar</button>
                </div>
                <div id="res1" class="derecha">Esperando...</div>
            </div>
        </div>

        <div class="ejercicio">
            <h3>2. Mayor de dos Números</h3>
            <div class="bloque-h">
                <div class="izquierda">
                    <input type="number" id="num1" placeholder="Num 1">
                    <input type="number" id="num2" placeholder="Num 2">
                    <button onclick="ex2()">Comparar</button>
                </div>
                <div id="res2" class="derecha">Esperando...</div>
            </div>
        </div>

        <div class="ejercicio">
            <h3>3. Vocales que aparecen</h3>
            <div class="bloque-h">
                <div class="izquierda">
                    <input type="text" id="input3" placeholder="Frase aquí...">
                    <button onclick="ex3()">Extraer</button>
                </div>
                <div id="res3" class="derecha">Esperando...</div>
            </div>
        </div>

        <div class="ejercicio">
            <h3>4. Conteo de cada Vocal</h3>
            <div class="bloque-h">
                <div class="izquierda">
                    <input type="text" id="input4" placeholder="Frase aquí...">
                    <button onclick="ex4()">Contar</button>
                </div>
                <div id="res4" class="derecha text-left">Esperando...</div>
            </div>
        </div>

        <div class="ejercicio">
            <h3>5. Petición AJAX (Estados)</h3>
            <div class="bloque-h">
                <div class="izquierda">
                    <input type="text" id="url" value="https://jsonplaceholder.typicode.com/todos/1">
                    <button onclick="ex5()">Enviar</button>
                </div>
                <div class="derecha text-left">
                    <p><strong>Estados:</strong> <span id="estados">-</span></p>
                    <p><strong>Código:</strong> <span id="codigo">-</span></p>
                    <p><strong>Respuesta:</strong> <span id="respuesta">-</span></p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
