<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Control</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: #1e3a8a; font-size: 1.5rem;">Tablero de Control: Aplicaciones en Red</h1>
    </header>

    <main class="dash">
        <section class="card">
            <h2>1. Detector de Palíndromos</h2>
            <div class="box">
                <div class="izq">
                    <input type="text" id="i1" placeholder="Frase...">
                    <button onclick="ex1()">Verificar</button>
                </div>
                <div id="r1" class="der">Esperando...</div>
            </div>
        </section>

        <section class="card">
            <h2>2. Mayor de dos Números</h2>
            <div class="box">
                <div class="izq">
                    <div class="row"><input type="number" id="n1"><input type="number" id="n2"></div>
                    <button onclick="ex2()">Comparar</button>
                </div>
                <div id="r2" class="der">Esperando...</div>
            </div>
        </section>

        <section class="card">
            <h2>3. Vocales que aparecen</h2>
            <div class="box">
                <div class="izq">
                    <input type="text" id="i3" placeholder="Frase...">
                    <button onclick="ex3()">Extraer</button>
                </div>
                <div id="r3" class="der">Esperando...</div>
            </div>
        </section>

        <section class="card">
            <h2>4. Conteo de cada Vocal</h2>
            <div class="box">
                <div class="izq">
                    <input type="text" id="i4" placeholder="Frase...">
                    <button onclick="ex4()">Contar</button>
                </div>
                <div id="r4" class="der" style="text-align: left;">Esperando...</div>
            </div>
        </section>

        <section class="card">
            <h2>5. Petición AJAX</h2>
            <div class="box">
                <div class="izq">
                    <input type="text" id="u" value="https://jsonplaceholder.typicode.com/todos/1">
                    <button onclick="ex5()">Enviar HTTP</button>
                </div>
                <div class="der" style="text-align: left; gap: 5px;">
                    <div><strong>Estados:</strong> <span id="e">-</span></div>
                    <div><strong>Código:</strong> <span id="c">-</span></div>
                    <div><strong>Respuesta:</strong> <pre id="p">-</pre></div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
