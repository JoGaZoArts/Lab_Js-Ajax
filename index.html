<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="todo-container">
        <div class="todo-header">
            <h1>Mis Tareas</h1>
            <p>Organizador diario básico</p>
        </div>

        <div class="input-section">
            <input type="text" id="nuevaTareaInput" placeholder="Escribe una nueva tarea...">
            <button onclick="agregarTarea()" class="btn-principal">Agregar</button>
        </div>

        <div class="stats-panel">
            <div class="stat-box">
                <span class="stat-label">Totales</span>
                <span id="txtTotales" class="stat-num">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Terminadas</span>
                <span id="txtTerminadas" class="stat-num">0</span>
            </div>
        </div>

        <ul id="listaTareas" class="todo-list">
            </ul>

        <div class="action-panel">
            <button onclick="limpiarCompletadas()" class="btn-limpiar">Eliminar Terminadas</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
